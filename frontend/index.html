<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>District 1 Calendar</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="js/config.js"></script>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { getSession, apiFetch } from './js/auth.js';
    import { initCalendar } from './js/calendar.js';

    const app = document.getElementById('app');

    function renderLogin() {
      app.innerHTML = `
        <div class="login-wrap">
          <div class="login-card">
            <h1>District 1 Calendar</h1>
            <p class="muted">Shared schedule, notes, and PROD sync for District 1 operations.</p>
            <form id="login-form">
              <label>Work email<input type="email" name="email" required placeholder="you@retailodyssey.com" /></label>
              <button type="submit" class="btn btn-primary">Email me a sign-in code</button>
            </form>
            <p id="login-msg" class="muted"></p>
            <p class="muted" style="margin-top:1rem;font-size:0.85rem;">
              Already have a code? <a href="sign-in.html">Enter it on the sign-in page</a>.
            </p>
          </div>
        </div>`;
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = new FormData(e.target).get('email');
        const msg = document.getElementById('login-msg');
        try {
          await apiFetch('/api/auth/request-link', { method: 'POST', body: JSON.stringify({ email }) });
          msg.innerHTML = `We emailed a <strong>6-digit sign-in code</strong> to you.
            <a href="sign-in.html?email=${encodeURIComponent(email)}">Enter your code</a> (open the sign-in page — do not use a link from the email with a token).`;
        } catch (err) {
          msg.textContent = err.message;
        }
      });
    }

    (async () => {
      const session = getSession();
      if (session?.user) {
        await initCalendar(app);
      } else {
        renderLogin();
      }
    })();
  </script>
</body>
</html>
