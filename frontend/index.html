<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>District 1 Calendar</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="js/config.js"></script>
  <script src="js/auth-gate.js"></script>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { fetchUser } from './js/auth.js';
    import { initCalendar } from './js/calendar.js';

    const app = document.getElementById('app');

    function renderBlocked(message) {
      app.innerHTML = `
        <div class="blocked-wrap">
          <div class="blocked-card">
            <h1>District 1 Calendar</h1>
            <p class="error">${message}</p>
            <p class="muted">Ask a District 1 admin to add you to the roster, then sign in again.</p>
            <button type="button" class="btn btn-primary" id="btn-signout">Sign out</button>
          </div>
        </div>`;
      document.getElementById('btn-signout')?.addEventListener('click', () => {
        window.dumpBinAuth?.signOut?.();
      });
    }

    (async () => {
      await window.dumpBinAuthReady;
      try {
        const user = await fetchUser();
        await initCalendar(app, user);
      } catch (err) {
        renderBlocked(err.message || 'Not authorized');
      }
    })();
  </script>
</body>
</html>
